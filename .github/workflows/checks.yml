# CI mirror of the commit gate, as lefthook-docker.md §5 prescribes: the same
# `lefthook run` against the same digest-pinned images, so local-green means
# CI-green. Plus the one check that does NOT belong at the commit boundary:
# full external link verification (the commit hook runs lychee --offline).
name: checks

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  gate:
    name: Commit gate (lefthook, all files)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Lefthook
        run: npm install -g lefthook@2.1.9 # pin version; bump via Renovate

      - name: Run pre-commit hooks (CI-equivalent)
        run: lefthook run pre-commit --all-files

  ps-port:
    name: PowerShell port (parse, analyze, smoke test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # The commit gate deliberately skips the .ps1 (PSScriptAnalyzer needs a
      # PowerShell runtime — too heavy for the commit boundary). The runner has
      # pwsh preinstalled, so the port gets its automated review here instead.
      - name: Parse check
        shell: pwsh
        run: |
          $errors = $null
          [System.Management.Automation.Language.Parser]::ParseFile(
            "$PWD/lean-worktrees.ps1", [ref]$null, [ref]$errors) | Out-Null
          if ($errors) { $errors | ForEach-Object { Write-Error $_.Message }; exit 1 }
          "Parse OK"

      - name: PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
          $findings = Invoke-ScriptAnalyzer -Path ./lean-worktrees.ps1 -Severity Warning, Error
          $findings | Format-Table -AutoSize
          if ($findings | Where-Object Severity -eq 'Error') { exit 1 }

      # The same four scenarios the canonical .sh gets (worktrees job below),
      # so the two ports stay behaviourally in lockstep.
      - name: Regression tests
        run: pwsh tests/lean-worktrees-test.ps1

  worktrees:
    name: Worktree helpers (${{ matrix.shell }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shell: [bash, zsh]
    steps:
      - uses: actions/checkout@v5

      - name: Install zsh
        if: matrix.shell == 'zsh'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq zsh

      # The script claims bash AND zsh support, and zsh-only bugs are real
      # (`local` re-declaration printed name=value noise under zsh while bash
      # stayed silent) — so both shells run the same suite.
      - name: Regression tests (${{ matrix.shell }})
        run: ${{ matrix.shell }} tests/lean-worktrees-test.sh

  external-links:
    name: External link check (network)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Same digest-pinned lychee image as lefthook.yml, without --offline.
      # GITHUB_TOKEN raises the rate limit for the github.com links.
      - name: lychee (online, all markdown)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          docker run --rm --user $(id -u):$(id -g) \
            -e GITHUB_TOKEN \
            -v "$PWD":/input -w /input \
            docker.io/lycheeverse/lychee@sha256:eaff3e0a13603c9a701accfcc84f44158bb77bf36ecfa4622b626056c3463892 \
            --no-progress '**/*.md'
